name: JuiceFuel

options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  JuiceFuel:
    type: application
    platform: iOS
    sources:
      - path: JuiceFuel
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: vip.juicecrew.juicefuel
        PRODUCT_NAME: JuiceFuel
        DEVELOPMENT_TEAM: 5P58Q2KW74
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: JuiceFuel/JuiceFuel.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: JuiceFuel/Info.plist
      properties:
        CFBundleDisplayName: JuiceFuel
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: vip.juicecrew.juicefuel
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - juicefuel
