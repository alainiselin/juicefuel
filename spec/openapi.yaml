openapi: 3.1.0
info:
  title: JuiceFuel API
  version: 1.0.0
  description: Meal planning and shopping list API for JuiceFuel

servers:
  - url: http://localhost:3000
    description: Local development

components:
  schemas:
    Unit:
      type: string
      enum: [G, KG, ML, L, TBSP, TSP, CUP, PIECE, PACKAGE, OTHER]
    
    SlotType:
      type: string
      enum: [BREAKFAST, LUNCH, DINNER, SNACK, OTHER]
    
    RecipeIngredient:
      type: object
      properties:
        ingredient_id:
          type: string
          format: uuid
        quantity:
          type: number
          nullable: true
        unit:
          $ref: '#/components/schemas/Unit'
          nullable: true
        note:
          type: string
          nullable: true
    
    Recipe:
      type: object
      properties:
        id:
          type: string
          format: uuid
        recipe_library_id:
          type: string
          format: uuid
        title:
          type: string
        source_url:
          type: string
          nullable: true
        instructions_markdown:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredient'
    
    CreateRecipe:
      type: object
      required:
        - recipe_library_id
        - title
      properties:
        recipe_library_id:
          type: string
          format: uuid
        title:
          type: string
        source_url:
          type: string
        instructions_markdown:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredient'
    
    MealPlanEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        meal_plan_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        slot:
          $ref: '#/components/schemas/SlotType'
        recipe_id:
          type: string
          format: uuid
        recipe:
          $ref: '#/components/schemas/Recipe'
    
    ShoppingListItem:
      type: object
      properties:
        ingredient_name:
          type: string
        total_quantity:
          type: number
          nullable: true
        unit:
          $ref: '#/components/schemas/Unit'
          nullable: true
        recipes:
          type: array
          items:
            type: string
    
    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /api/recipes:
    get:
      summary: List recipes
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: recipe_library_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'
    
    post:
      summary: Create a recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipe'
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/recipes/{id}:
    get:
      summary: Get recipe by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Recipe found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          description: Recipe not found
    
    patch:
      summary: Update a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                source_url:
                  type: string
                  nullable: true
                instructions_markdown:
                  type: string
                  nullable: true
                ingredients:
                  type: array
                  items:
                    $ref: '#/components/schemas/RecipeIngredient'
      responses:
        '200':
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          description: Recipe not found
    
    delete:
      summary: Delete a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Recipe deleted
        '404':
          description: Recipe not found
  
  /api/meal-plan:
    get:
      summary: Get meal plan entries for date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: meal_plan_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Meal plan entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MealPlanEntry'
    
    post:
      summary: Create meal plan entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - meal_plan_id
                - date
                - slot
                - recipe_id
              properties:
                meal_plan_id:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                slot:
                  $ref: '#/components/schemas/SlotType'
                recipe_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Meal plan entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanEntry'
        '400':
          description: Validation error
  
  /api/meal-plan/{id}:
    patch:
      summary: Update meal plan entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
                slot:
                  $ref: '#/components/schemas/SlotType'
                recipe_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanEntry'
        '404':
          description: Entry not found
    
    delete:
      summary: Delete meal plan entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Entry deleted
        '404':
          description: Entry not found
  
  /api/shopping-list:
    get:
      summary: Generate shopping list from meal plan
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: meal_plan_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aggregated shopping list
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                    format: date
                  to:
                    type: string
                    format: date
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShoppingListItem'
